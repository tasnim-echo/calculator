<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="/styles/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="calculator-content">
        <!-- result section -->
        <section class="result">
          <!-- Current input / expression -->
          <p class="result-input" id="result-input">5000+2000-1000</p>
          <!-- Final calculated value -->
          <p class="result-output" id="result-output">60000</p>
        </section>

        <!-- keyboard section -->
        <section class="keyboard">
          <div class="keyboard-buttons">
            <div class="button button-c">
              <img src="/assets/C.svg" alt="" />
            </div>
            <div class="button button-del"><span>Del</span></div>
            <div class="button button-percent"><span>%</span></div>
            <div class="button button-division">
              <img src="assets/Group 1.svg" alt="" />
            </div>

            <div class="button number-button"><span>1</span></div>
            <div class="button number-button"><span>2</span></div>
            <div class="button number-button"><span>3</span></div>

            <div class="button button-mul">
              <img src="assets/x.svg" alt="" />
            </div>

            <div class="button number-button"><span>4</span></div>
            <div class="button number-button"><span>5</span></div>
            <div class="button number-button"><span>6</span></div>
            <div class="button button-add">
              <img src="assets/+.svg" alt="" />
            </div>
            <div class="button number-button"><span>7</span></div>
            <div class="button number-button"><span>8</span></div>
            <div class="button number-button"><span>9</span></div>
            <div class="button button-sub">
              <img src="assets/_.svg" alt="" />
            </div>
            <div class="button number-button button-zero"><span>0</span></div>
            <div class="button number-button"><span>.</span></div>
            <div class="button button-equal">
              <img src="assets/=.svg" alt="" />
            </div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
